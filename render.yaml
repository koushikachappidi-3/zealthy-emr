services:
  - type: web
    name: zealthy-emr
    env: python
    buildCommand: python -m pip install --upgrade pip && pip install -r server/requirements.txt && cd client && npm ci && npm run build
    startCommand: cd server && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
